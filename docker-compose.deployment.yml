services:
  # TODO(RDS/Grafana): keep local-first testing as-is for now.
  # Future production direction:
  # - all backend services connect to one private RDS endpoint from the data layer
  # - only operator-facing flow should eventually expose Grafana embedding
  # - if Grafana is added, prefer attaching it behind ALB / separate service instead of mixing it into login/user flows
  login-backend:
    image: ${LOGIN_BACKEND_IMAGE:-your-registry/web-platform-login-backend:latest}
    container_name: web-platform-login-backend
    restart: unless-stopped
    env_file:
      - ./deploy.env
    environment:
      PORT: 4000
      APP_TARGET: login
      # Uncomment when switching from DATABASE_URL to split RDS variables.
      # DB_HOST: ${DB_HOST}
      # DB_PORT: ${DB_PORT:-5432}
      # DB_NAME: ${DB_NAME}
      # DB_USER: ${DB_USER}
      # DB_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  user-backend:
    image: ${USER_BACKEND_IMAGE:-your-registry/web-platform-user-backend:latest}
    container_name: web-platform-user-backend
    restart: unless-stopped
    env_file:
      - ./deploy.env
    environment:
      PORT: 4000
      APP_TARGET: user
      # Uncomment when switching from DATABASE_URL to split RDS variables.
      # DB_HOST: ${DB_HOST}
      # DB_PORT: ${DB_PORT:-5432}
      # DB_NAME: ${DB_NAME}
      # DB_USER: ${DB_USER}
      # DB_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  operator-backend:
    image: ${OPERATOR_BACKEND_IMAGE:-your-registry/web-platform-operator-backend:latest}
    container_name: web-platform-operator-backend
    restart: unless-stopped
    env_file:
      - ./deploy.env
    environment:
      PORT: 4000
      APP_TARGET: operator
      # Uncomment when switching from DATABASE_URL to split RDS variables.
      # DB_HOST: ${DB_HOST}
      # DB_PORT: ${DB_PORT:-5432}
      # DB_NAME: ${DB_NAME}
      # DB_USER: ${DB_USER}
      # DB_PASSWORD: ${DB_PASSWORD}
      # Grafana embed endpoint scaffold is implemented in backend/src/grafana.js.
      # Enable the env keys below together with the commented route in backend/src/server.js.
      # GRAFANA_ENABLED: ${GRAFANA_ENABLED:-false}
      # GRAFANA_BASE_URL: ${GRAFANA_BASE_URL}
      # GRAFANA_EMBED_URL: ${GRAFANA_EMBED_URL}
      # GRAFANA_ALLOW_EMBED: ${GRAFANA_ALLOW_EMBED:-false}
      # GRAFANA_PROVIDER: ${GRAFANA_PROVIDER:-self-hosted}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  login-frontend:
    image: ${LOGIN_FRONTEND_IMAGE:-your-registry/web-platform-login-frontend:latest}
    container_name: web-platform-login-frontend
    restart: unless-stopped
    depends_on:
      login-backend:
        condition: service_healthy
    ports:
      - '${LOGIN_FRONTEND_PORT:-8080}:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-frontend:
    image: ${USER_FRONTEND_IMAGE:-your-registry/web-platform-user-frontend:latest}
    container_name: web-platform-user-frontend
    restart: unless-stopped
    depends_on:
      user-backend:
        condition: service_healthy
    ports:
      - '${USER_FRONTEND_PORT:-8081}:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  operator-frontend:
    image: ${OPERATOR_FRONTEND_IMAGE:-your-registry/web-platform-operator-frontend:latest}
    container_name: web-platform-operator-frontend
    restart: unless-stopped
    depends_on:
      operator-backend:
        condition: service_healthy
    ports:
      - '${OPERATOR_FRONTEND_PORT:-8082}:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Uncomment this service only when you want deployment-side self-hosted Grafana.
  # Keep it disabled for local app testing until dashboards / auth / datasource are finalized.
  #
  # grafana:
  #   image: grafana/grafana:11.1.0
  #   container_name: web-platform-grafana
  #   restart: unless-stopped
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     GF_SERVER_ROOT_URL: ${GRAFANA_BASE_URL}
  #     GF_SECURITY_ALLOW_EMBEDDING: 'true'
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   # Suggested next step when enabling:
  #   # - put Grafana behind ALB or reverse proxy
  #   # - connect Prometheus / Loki / other datasources
  #   # - then enable backend/src/server.js grafana route and frontend API usage

