services:
  backend:
    image: your-registry/web-platform-backend:latest
    container_name: web-platform-backend
    restart: unless-stopped
    env_file:
      - ./deploy.env
    environment:
      PORT: 4000
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  user-frontend:
    image: your-registry/web-platform-user-frontend:latest
    container_name: web-platform-user-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  operator-frontend:
    image: your-registry/web-platform-operator-frontend:latest
    container_name: web-platform-operator-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8081:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
